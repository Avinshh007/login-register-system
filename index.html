<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Registration Form</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS FILE -->

    <link rel="stylesheet" href="style1.css">

</head>

<body>

    <!-- REGISTER PAGE -->

    <div class="container-box" id="registerSection">

        <!-- THEME TOGGLE -->

        <div class="theme-toggle" id="themeToggle">

            🌙

        </div>

        <!-- TITLE -->

        <div class="title">

            Registration Form

        </div>

        <!-- FORM -->

        <form id="registerForm">

            <div class="row">

                <!-- FULL NAME -->

                <div class="col-md-6 mb-4">

                    <span class="details">
                        Full Name
                    </span>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-person"></i>

                        </span>

                        <input type="text" class="form-control" id="fullname"
                            oninput="this.value = this.value.replace(/[^a-zA-Z ]/g,'')" placeholder="Enter full name">

                    </div>

                    <small class="error-message" id="fullnameError"></small>

                </div>

                <!-- USERNAME -->

                <div class="col-md-6 mb-4">

                    <span class="details">
                        Username
                    </span>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-person-badge"></i>

                        </span>

                        <input type="text" class="form-control" id="username"
                            oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g,'')" placeholder="Enter username">

                    </div>

                    <small class="error-message" id="usernameError"></small>

                </div>

                <!-- EMAIL -->

                <div class="col-md-6 mb-4">

                    <span class="details">
                        Email
                    </span>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-envelope"></i>

                        </span>

                        <input type="email" class="form-control" id="email" placeholder="Enter email">

                    </div>

                    <small class="error-message" id="emailError"></small>

                </div>

                <!-- MOBILE -->

                <div class="col-md-6 mb-4">

                    <span class="details">
                        Mobile Number
                    </span>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-telephone"></i>

                        </span>

                        <input type="number" class="form-control" id="mobile" maxlength="10"
                            oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,10)"
                            placeholder="Enter mobile number">

                    </div>

                    <small class="error-message" id="mobileError"></small>

                </div>

                <!-- PASSWORD -->

                <div class="col-md-6 mb-4">

                    <span class="details">
                        Password
                    </span>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-lock"></i>

                        </span>

                        <input type="password" class="form-control" id="password" placeholder="Enter password">

                        <span class="input-group-text" id="togglePassword">

                            <i class="bi bi-eye-fill"></i>

                        </span>

                    </div>

                    <small class="error-message" id="passwordError"></small>

                </div>

                <!-- CONFIRM PASSWORD -->

                <div class="col-md-6 mb-4">

                    <span class="details">
                        Confirm Password
                    </span>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-lock-fill"></i>

                        </span>

                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">

                        <span class="input-group-text" id="toggleConfirmPassword">

                            <i class="bi bi-eye-fill"></i>

                        </span>

                    </div>

                    <small class="error-message" id="confirmPasswordError"></small>

                </div>

            </div>

            <!-- GENDER -->

            <div class="mb-4">

                <span class="gender-title">
                    Gender
                </span>

                <div class="mt-2">

                    <div class="form-check form-check-inline">

                        <input class="form-check-input" type="radio" name="gender" checked>

                        <label class="form-check-label">
                            Male
                        </label>

                    </div>

                    <div class="form-check form-check-inline">

                        <input class="form-check-input" type="radio" name="gender">

                        <label class="form-check-label">
                            Female
                        </label>

                    </div>

                    <div class="form-check form-check-inline">

                        <input class="form-check-input" type="radio" name="gender">

                        <label class="form-check-label">
                            Other
                        </label>

                    </div>

                </div>

            </div>
            <!-- EDUCATION TABLE -->

<div class="education-section mt-4">

    <h4 class="mb-3">
        Education Details
    </h4>

    <table class="table table-bordered text-white"
    id="educationTable">

        <thead>

            <tr>

                <th>
                    College Name
                </th>

                <th>
                    Passout Year
                </th>

                <th>
                    Percentage
                </th>

                <th>
                    add/remove
                </th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <!-- COLLEGE -->

                <td>

                    <input type="text"
                    class="form-control"oninput="this.value = this.value.replace(/[^a-zA-Z ]/g,'')"
                    placeholder="college">

                </td>

                <!-- YEAR -->

                <td>

                    <input type="number" 
                    class="form-control"oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,4)"
                    placeholder="2026">

                </td>

                <!-- PERCENTAGE -->

                <td>

                    <input type="number"
                    class="form-control"oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,4)"
                    placeholder="85%">

                </td>

                <!-- BUTTONS -->

                <td class="text-center">

                    <button type="button"
                    class="btn btn-success addRow">

                        +

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

            <!-- BUTTON -->

            <button type="submit" class="register-btn">

                Register

            </button>

        </form>

    </div>

    <!-- PROFILE PAGE -->

    <div class="profile-box" id="profileSection">

        <div class="profile-card">

            <div class="profile-avatar" id="profileAvatar">

            </div>

            <h2 id="profileName">
            </h2>

            <p id="profileUsername">
            </p>

            <p id="profileEmail">
            </p>

            <p id="profileMobile">
            </p>

            <button class="logout-btn" onclick="logoutUser()">

                Logout

            </button>

        </div>

    </div>

    <!-- JAVASCRIPT -->

    <script>

        /* DARK MODE */

        const themeToggle =
            document.getElementById("themeToggle");

        themeToggle.addEventListener("click", function () {

            document.body.classList.toggle("dark-mode");

            if (document.body.classList.contains("dark-mode")) {

                themeToggle.innerHTML = "☀️";

            }
            else {

                themeToggle.innerHTML = "🌙";

            }

        });

        /* REGISTER FORM */

        const form =
            document.getElementById("registerForm");

        form.addEventListener("submit", function (event) {
            console.log(event);

            event.preventDefault();

            let fullname =
                document.getElementById("fullname").value.trim();

            let username =
                document.getElementById("username").value.trim();

            let email =
                document.getElementById("email").value.trim();

            let mobile =
                document.getElementById("mobile").value.trim();

            let passwordValue =
                document.getElementById("password").value;

            let confirmPasswordValue =
                document.getElementById("confirmPassword").value;

            /* CLEAR OLD ERRORS */

            document.querySelectorAll(".error-message")
                .forEach(function (error) {

                    error.innerHTML = "";

                });

            document.querySelectorAll(".form-control")
                .forEach(function (input) {

                    input.classList.remove("input-error");

                });

            let isValid = true;

            /* FULL NAME */

            const fullNamePattern =
                /^[A-Za-z]+( [A-Za-z]+)*$/;

            if (!fullNamePattern.test(fullname)) {

                document.getElementById("fullnameError")
                    .innerHTML =
                    "Minimum 4 characters required";

                document.getElementById("fullname")
                    .classList.add("input-error");

                isValid = false;

            }

            /* USERNAME */

            if (username.length < 4) {

                document.getElementById("usernameError")
                    .innerHTML =
                    "Minimum 4 characters required";

                document.getElementById("username")
                    .classList.add("input-error");

                isValid = false;

            }

            /* EMAIL */


            if (!email.endsWith("@gmail.com")) {

                document.getElementById("emailError")
                    .innerHTML =
                    "Email must end with @gmail.com";

                document.getElementById("email")
                    .classList.add("input-error");

                isValid = false;

            }

            /* MOBILE */

            if (mobile.length !== 10) {

                document.getElementById("mobileError")
                    .innerHTML =
                    "Mobile must be 10 digits";

                document.getElementById("mobile")
                    .classList.add("input-error");

                isValid = false;

            }

            /* PASSWORD */

            if (passwordValue.length < 8) {

                document.getElementById("passwordError")
                    .innerHTML =
                    "Password must be 8+ characters";

                document.getElementById("password")
                    .classList.add("input-error");

                isValid = false;

            }

            /* CONFIRM PASSWORD */

            if (passwordValue !== confirmPasswordValue) {

                document.getElementById("confirmPasswordError")
                    .innerHTML =
                    "Passwords do not match";

                document.getElementById("confirmPassword")
                    .classList.add("input-error");

                isValid = false;

            }

            /* STOP FORM */

            if (!isValid) {

                return;

            }

            /* SHOW PROFILE */

            document.getElementById("registerSection")
                .style.display = "none";

            document.getElementById("profileSection")
                .style.display = "flex";

            /* PROFILE DATA */

            document.getElementById("profileName")
                .innerHTML = fullname;

            document.getElementById("profileUsername")
                .innerHTML = "@" + username;

            document.getElementById("profileEmail")
                .innerHTML = email;

            document.getElementById("profileMobile")
                .innerHTML = mobile;

            /* AVATAR */

            document.getElementById("profileAvatar")
                .innerHTML =
                fullname.charAt(0).toUpperCase();

        });

        /* LOGOUT */

        function logoutUser() {

            location.reload();

        }

        /* PASSWORD TOGGLE */

        const passwordField =
            document.getElementById("password");

        const togglePassword =
            document.getElementById("togglePassword");

        togglePassword.addEventListener("click", function () {

            if (passwordField.type === "password") {

                passwordField.type = "text";

                togglePassword.innerHTML =
                    '<i class="bi bi-eye-slash-fill"></i>';

            }
            else {

                passwordField.type = "password";

                togglePassword.innerHTML =
                    '<i class="bi bi-eye-fill"></i>';

            }

        });

        /* CONFIRM PASSWORD TOGGLE */

        const confirmPasswordField =
            document.getElementById("confirmPassword");

        const toggleConfirmPassword =
            document.getElementById("toggleConfirmPassword");

        toggleConfirmPassword.addEventListener("click", function () {

            if (confirmPasswordField.type === "password") {

                confirmPasswordField.type = "text";

                toggleConfirmPassword.innerHTML =
                    '<i class="bi bi-eye-slash-fill"></i>';

            }
            else {

                confirmPasswordField.type = "password";

                toggleConfirmPassword.innerHTML =
                    '<i class="bi bi-eye-fill"></i>';

            }


            

        });

        /* about action button */

  /* EDUCATION TABLE */

const educationTable =
document.getElementById("educationTable");

educationTable.addEventListener("click",function(event){

    let tbody =
    educationTable.querySelector("tbody");

    let rows =
    tbody.querySelectorAll("tr");

    let count =
    rows.length;

    /* ADD ROW */

    if(event.target.classList.contains("addRow")){

        if(count >= 5){

            alert("Maximum 5 rows only");

            return;

        }

        /* REMOVE OLD ADD BUTTON */

        rows.forEach(function(row){

            let addBtn =
            row.querySelector(".addRow");

            if(addBtn){

                addBtn.remove();

            }

        });

        /* CREATE NEW ROW */

        let newRow =
        document.createElement("tr");

        newRow.innerHTML = `

        <td>

            <input type="text"
            class="form-control"
            oninput="this.value = this.value.replace(/[^a-zA-Z ]/g,'')"
            placeholder="Enter college name">

        </td>

        <td>

            <input type="number"
            class="form-control" oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,4)"
            placeholder="2025">

        </td>

        <td>

            <input type="number"
            class="form-control" oninput="this.value = this.value.replace(/[^0-9.]/g,'').slice(0,6)"
            placeholder="85%">

        </td>

        <td class="text-center">

            <button type="button"
            class="btn btn-success addRow">

                +

            </button>

            <button type="button"
            class="btn btn-danger removeRow ms-2">

                -

            </button>

        </td>

        `;

        tbody.appendChild(newRow);

    }

    /* REMOVE ROW */

    if(event.target.classList.contains("removeRow")){

        let currentRow =
        event.target.closest("tr");

        currentRow.remove();

        let updatedRows =
        tbody.querySelectorAll("tr");

        /* REMOVE ALL ADD BUTTONS */

        updatedRows.forEach(function(row){

            let addBtn =
            row.querySelector(".addRow");

            if(addBtn){

                addBtn.remove();

            }

        });

        /* ADD BUTTON ONLY TO LAST ROW */

        let lastRow =
        updatedRows[updatedRows.length - 1];

        let actionCell =
        lastRow.querySelector("td:last-child");

        actionCell.insertAdjacentHTML("afterbegin",`

            <button type="button"
            class="btn btn-success addRow">

                +

            </button>

        `);

    }

});

    </script>

</body>

</html>
